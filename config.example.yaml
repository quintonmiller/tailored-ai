server:
  port: 3000
  host: 127.0.0.1
database:
  path: ./agent.db
providers:
  ollama:
    baseUrl: http://localhost:11434
    defaultModel: devstral-small-2:latest
  # openai:
  #   apiKey: ${OPENAI_API_KEY}
  #   defaultModel: gpt-4o
  #   baseUrl: https://api.openai.com/v1   # optional, for OpenAI-compatible APIs
  # anthropic:
  #   apiKey: ${ANTHROPIC_API_KEY}
  #   defaultModel: claude-sonnet-4-5-20250929
  #   baseUrl: https://api.anthropic.com   # optional
agent:
  defaultProvider: ollama
  extraInstructions: ""
  maxHistoryTokens: 20000
  temperature: 0.7
  maxToolRounds: 100
channels:
  discord:
    enabled: false
    token: ${DISCORD_BOT_TOKEN}
    owner: ${DISCORD_OWNER_ID}
    respondToDMs: true
    respondToMentions: true
tools:
  exec:
    enabled: true
    allowedCommands:
      - ls
  read:
    enabled: true
  write:
    enabled: true
  web_fetch:
    enabled: true
  web_search:
    enabled: false
    provider: brave
    apiKey: ${BRAVE_API_KEY}
    maxResults: 5
  tasks:
    enabled: true
  gmail:
    enabled: false
    account: ${GOG_ACCOUNT}
  google_calendar:
    enabled: false
    account: ${GOG_ACCOUNT}
  claude_code:
    enabled: false
  browser:
    enabled: false
    headless: true
  md_to_pdf:
    enabled: false
  google_drive:
    enabled: false
    account: ${GOG_ACCOUNT}
    folder_name: My uploads
    folder_id: your-folder-id-here
  ask_user:
    enabled: true
agents:
  researcher:
    description: Research assistant for web search and summarization
    instructions: You are a research assistant. Search the web, fetch pages, and
      summarize findings concisely.
    tools:
      - web_search
      - web_fetch
      - memory
    temperature: 0.5
    maxToolRounds: 8
  writer:
    description: Writing assistant for drafting and editing content
    instructions: You are a writing assistant. Read files for context, then draft or
      edit content. Save results with the write tool.
    tools:
      - read
      - write
      - memory
    temperature: 0.7
    maxToolRounds: 10
cron:
  enabled: false
  jobs: []
custom_tools:
  weather:
    command: curl -s wttr.in/{{city}}?format=3
    description: Get weather
    parameters:
      city:
        description: City name
        type: string
  git_log:
    command: git log --oneline -n {{count}}
    description: Show recent git commits
    parameters:
      count:
        description: Number of commits
        type: string
  uptime:
    command: uptime
    description: Show system uptime
    parameters: {}
