server:
  port: 3000
  host: "127.0.0.1"

database:
  path: "./agent.db"

providers:
  ollama:
    baseUrl: "http://localhost:11434"
    defaultModel: "devstral-small-2:latest"

agent:
  defaultProvider: "ollama"
  extraInstructions: ""
  maxHistoryTokens: 2000
  temperature: 0.3
  maxToolRounds: 10

channels:
  discord:
    enabled: true
    token: "${DISCORD_BOT_TOKEN}"
    respondToDMs: true
    respondToMentions: true
    # allowedGuilds:
    #   - "guild-id-here"

tools:
  exec:
    enabled: true
    allowedCommands: ["ls"]
  read:
    enabled: true
  write:
    enabled: true
  web_fetch:
    enabled: true
  web_search:
    enabled: true
    provider: "brave"
    apiKey: "${BRAVE_API_KEY}"
    maxResults: 5
  trello:
    enabled: true
    apiKey: "${TRELLO_API_KEY}"
    token: "${TRELLO_TOKEN}"
  gmail:
    enabled: true
    account: "${GOG_ACCOUNT}"
  google_calendar:
    enabled: true
    account: "${GOG_ACCOUNT}"
  claude_code:
    enabled: false
    # allowedTools: ["Read", "Glob", "Grep", "Bash(git *)"]
    # disallowedTools: []
    # maxTurns: 10
    # model: "sonnet"
